[scenario]
name = "ElevenLabs TTS stress test"
provider = "elevenlabs"
modality = "tts"
concurrency = [1, 5, 10, 25, 50]
budget_limit_usd = 5.00

[provider.elevenlabs]
api_key = "${ELEVENLABS_API_KEY}"
model = "eleven_multilingual_v2"
voice_id = "21m00Tcm4TlvDq8ikWAM"
# Optional: override the built-in cost estimate (USD per 1M characters) with
# your actual plan rate, so the cost axis is accurate for you.
# cost_per_million_chars = 180.0

[prompts]
source = "inline"
texts = [
    "The quick brown fox jumps over the lazy dog.",
    "In the beginning, there was nothing. Then there was everything.",
    "Please confirm your appointment for Tuesday at three thirty PM.",
    "The total comes to four hundred and twenty-seven dollars and sixty-three cents.",
]

[scoring]
metrics = ["latency", "wer", "duration_accuracy", "file_integrity"]
whisper_model = "base"

[thresholds]
warn_wer = 0.05
fail_wer = 0.10
warn_latency_p95 = 10.0
fail_latency_p95 = 30.0
